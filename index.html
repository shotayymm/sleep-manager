<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sleep Log</title>
<style>
:root{
  --surface-0:#f1efe8; --surface-1:#fcfcfb; --surface-2:#ffffff;
  --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
  --border:rgba(42,120,214,0.16); --border-strong:rgba(11,11,11,0.22);
  --label-tint:#5c7695;
  --accent:#2a78d6; --bg-accent:#e6f1fb; --text-accent:#0c447c;
  --text-warning:#854f0b;
  --radius:10px;
}
@media (prefers-color-scheme: dark){
  :root{
    --surface-0:#171716; --surface-1:#212120; --surface-2:#292928;
    --text-primary:#f5f5f3; --text-secondary:#c3c2b7; --text-muted:#8f8e88;
    --border:rgba(143,192,240,0.20); --border-strong:rgba(255,255,255,0.26);
    --bg-accent:#0c2a45; --text-accent:#8fc0f0;
    --text-warning:#f0c060;
    --label-tint:#9fb8d1;
  }
}
*{box-sizing:border-box;}
html, body{ height:100%; height:100dvh; overflow:hidden; position:fixed; top:0; left:0; width:100%; }
body{
  margin:0; background:var(--surface-0); color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:420px; height:100%; height:100dvh; margin:0 auto; padding:16px 16px 8px; overflow-y:auto; box-sizing:border-box;}
.view{display:none;}
.view.active{display:block;}
.card{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:0;}
.label{font-size:12px; color:var(--label-tint); margin:0 0 6px;}
.sublabel{font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;}
.row{display:flex; justify-content:space-between; align-items:center;}
.title-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
h1{font-size:16px; font-weight:500; margin:0;}
input,select,textarea{
  width:100%; padding:8px 10px; border:1px solid var(--border-strong); border-radius:8px;
  background:var(--surface-1); color:var(--text-primary); font-size:14px; font-family:inherit;
}
input[type="checkbox"]{ width:18px; height:18px; flex-shrink:0; padding:0; }
input[type="time"]{ font-size:14px; padding:6px 8px; height:36px; }
input[type="time"]::-webkit-datetime-edit{ font-size:14px; }
input[type="time"]::-webkit-datetime-edit-fields-wrapper{ font-size:14px; }
textarea{min-height:70px; resize:vertical;}
button{
  font-family:inherit; font-size:13px; padding:9px 12px; border-radius:8px;
  border:1px solid var(--border-strong); background:transparent; color:var(--text-primary); cursor:pointer;
}
button:active{transform:scale(0.98);}
.btn-block{width:100%;}
.btn-primary{background:var(--accent); color:#fff; border:none;}
.btn-ghost-sm{font-size:12px; padding:6px 10px;}
.seg{display:flex; gap:6px;}
.seg button{flex:1; padding:8px 0; font-size:12px;}
.seg button.on{border-color:var(--accent); background:var(--bg-accent); color:var(--text-accent);}
.toggle2{display:flex; gap:8px;}
.toggle2 button{flex:1; padding:6px 0;}
.toggle2 button.on{border-color:var(--accent); background:var(--bg-accent); color:var(--text-accent);}
.stepper{display:flex; align-items:center; gap:6px; margin-bottom:14px;}
.wizard-scroller{display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.wizard-scroller::-webkit-scrollbar{display:none;}
.wizard-page{flex:0 0 100%; max-width:100%; scroll-snap-align:start; box-sizing:border-box; padding-bottom:200px;}
#view-home, #view-history, #view-detail, #view-settings{ padding-bottom:82px; }
.stepper .lbl{font-size:12px; color:var(--text-secondary);}
.dots{display:flex; gap:4px; margin-left:auto;}
.dots span{width:16px; height:4px; border-radius:2px; background:var(--border);}
.dots span.on{background:var(--accent);}
.checkline{display:flex; align-items:center; gap:8px; padding:6px 0; cursor:pointer; font-size:14px;}
.tl-grid{display:grid; grid-template-columns:32px 1fr 16px 1fr; align-items:baseline;}
.tl-head span{font-size:11px; color:var(--text-muted);}
.tl-row{display:contents;}
.tl-row > span{padding:5px 0; font-size:14px;}
.tl-row:not(:first-of-type) > span{border-top:1px solid var(--border);}
.tag{font-size:12px; color:var(--text-muted);}
.arrow{color:var(--border-strong); font-size:12px; text-align:center;}
.blank{color:var(--border-strong);}
#bottom-nav{
  position:fixed; left:0; right:0; bottom:0; z-index:10;
  max-width:420px; margin:0 auto; box-sizing:border-box;
  display:flex; justify-content:space-around;
  background:var(--surface-0); border-top:1px solid var(--border);
  padding:8px 16px calc(20px + env(safe-area-inset-bottom));
}
.nav-item{display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; color:var(--text-secondary); cursor:pointer;}
.nav-item.active{color:var(--accent);}
.nav-icon{width:20px; height:20px;}
.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}
.modal{background:var(--surface-2); border-radius:16px; padding:20px; width:280px; max-width:100%;}
.modal-title{font-size:14px; font-weight:500; text-align:center; margin:0 0 14px;}
.wheel-wrap{ position:relative; height:180px; margin-bottom:12px; }
.wheel-center{ position:absolute; top:50%; left:0; right:0; height:36px; margin-top:-18px; background:var(--surface-1); border-radius:8px; pointer-events:none; }
.wheel-scroll{ position:relative; height:180px; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.wheel-scroll::-webkit-scrollbar{ display:none; }
.wheel-item{ height:36px; display:flex; align-items:center; justify-content:center; scroll-snap-align:center; font-size:15px; color:var(--text-primary); }
.wheel-pad{ height:72px; }
table.info{width:100%; font-size:13px; border-collapse:collapse;}
table.info td{padding:4px 0; color:var(--text-secondary);}
table.info td:last-child{text-align:right; color:var(--text-primary);}
.hist-row{cursor:pointer; padding:10px 0; border-bottom:1px solid var(--border); position:relative;}
.hist-track{flex:1; position:relative; height:14px; background:var(--surface-1); border:1px solid var(--border); border-radius:7px;}
.hist-bar{position:absolute; height:100%; background:var(--bg-accent); border-radius:7px;}
.legend{display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--text-secondary); margin-bottom:10px;}
.dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:4px;}
.empty{font-size:13px; color:var(--text-muted); text-align:center; padding:24px 0;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== HOME ===== -->
  <div class="view active" id="view-home">
    <div class="row" style="margin-bottom:2px;">
      <span onclick="homeShiftDay(-1)" style="cursor:pointer; font-size:18px; color:var(--text-muted); padding:14px 18px;">‹</span>
      <span id="home-date" onclick="openDatePicker()" style="cursor:pointer; font-size:14px; font-weight:500;"></span>
      <span onclick="homeShiftDay(1)" style="cursor:pointer; font-size:18px; color:var(--text-muted); padding:14px 18px;">›</span>
    </div>
    <div class="row" style="justify-content:center; margin-bottom:8px;">
      <span id="home-preset-area" style="cursor:pointer; font-size:12px; color:var(--text-accent); padding:8px 14px;">プリセット ▾</span>
    </div>

    <div class="card">
      <div class="tl-grid" id="home-timeline"></div>
      <div style="border-top:1px solid var(--border); margin-top:6px;">
        <div style="display:flex;">
          <label class="checkline" style="flex:1;"><input type="checkbox" id="home-midwake"><span>中途覚醒</span></label>
          <label class="checkline" style="flex:1;"><input type="checkbox" id="home-secondsleep"><span>二度寝</span></label>
        </div>
        <div style="display:flex; align-items:center; border-top:1px solid var(--border); padding:6px 0; gap:4px;">
          <span style="font-size:12px; color:var(--text-muted); flex-shrink:0;">起床</span>
          <span id="home-alarm-val" onclick="openAlarmPicker()" style="cursor:pointer; font-size:13px; flex:1; padding:6px 4px;"></span>
          <span style="font-size:12px; color:var(--text-muted); flex-shrink:0;">覚醒度</span>
          <span id="home-alertness-val" onclick="openAlertnessPicker()" style="cursor:pointer; font-size:13px; flex:1; text-align:right; padding:6px 4px;"></span>
        </div>
        <div id="home-routine-row" style="border-top:1px solid var(--border); padding:8px 0;">
          <label class="checkline" style="padding:0; pointer-events:none;">
            <input type="checkbox" id="home-routine-check" disabled>
            <span id="home-routine-label">起床ルーティン</span>
          </label>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="label">今日の入力</p>
      <div id="home-daytime-block"></div>
      <div style="border-top:1px solid var(--border); margin:8px 0;"></div>
      <div class="toggle2" style="margin-bottom:8px;">
        <button id="home-exercise" onclick="homeToggleExercise()" style="font-size:11px; padding-left:2px; padding-right:2px;">運動</button>
        <button id="home-alcohol" onclick="homeToggleAlcohol()" style="font-size:11px; padding-left:2px; padding-right:2px;">飲酒</button>
        <button id="home-stretch" onclick="homeToggleFallAsleep('stretch')" style="font-size:11px; padding-left:2px; padding-right:2px;">ストレッチ</button>
        <button id="home-fascia" onclick="homeToggleFallAsleep('fasciaRelease')" style="font-size:11px; padding-left:2px; padding-right:2px;">筋膜リリース</button>
      </div>
      <p id="home-supp-link" onclick="openSuppDetail()" style="cursor:pointer; font-size:12px; color:var(--text-accent); margin:0;"></p>
    </div>

    <div class="card">
      <p id="home-prev-routine-link" onclick="openPrevRoutineDetail()" style="cursor:pointer; font-size:12px; color:var(--text-accent); margin:0;"></p>
    </div>

    <button class="btn-block btn-primary" style="margin-top:4px; margin-bottom:4px;" onclick="startWizard(draftDate)">詳しく記録する（全項目）</button>
    <p id="home-backup-status" style="text-align:center; font-size:11px; color:var(--text-muted); margin:0;"></p>
  </div>

  <!-- ===== WIZARD ===== -->
  <div class="view" id="view-wizard">

    <div class="stepper" style="position:sticky; top:0; background:var(--surface-0); z-index:5; padding-top:2px;">
      <button class="btn-ghost-sm" onclick="showView('home')">← 戻る</button>
      <span class="lbl" id="wizard-phase-label">生活習慣</span>
      <div class="dots" id="wizard-dots"><span class="on"></span><span></span></div>
    </div>

    <div class="wizard-scroller" id="wizard-scroller">

    <div class="wizard-page" id="phase-3">
      <div class="card">
        <p class="label">寝る前の習慣</p>
        <div class="toggle2" style="margin-bottom:12px;">
          <button id="f-fascia" onclick="toggleBlock('fasciaRelease')">筋膜リリース</button>
          <button id="f-stretch" onclick="toggleBlock('stretch')">ストレッチ</button>
        </div>
        <p class="sublabel">飲酒</p>
        <div class="toggle2" style="margin-bottom:12px;">
          <button id="f-alc-yes" onclick="setAlcohol(true)">あり</button>
          <button id="f-alc-no" onclick="setAlcohol(false)">なし</button>
        </div>
        <p class="sublabel">糖質（夜）</p>
        <button class="btn-block" id="f-carbs-btn" onclick="openCarbsPicker()" style="text-align:left; padding-left:12px;"></button>
      </div>
      <div class="card">
        <p class="label">運動</p>
        <div class="toggle2">
          <button id="f-ex-yes" onclick="setExercise(true)">あり</button>
          <button id="f-ex-no" onclick="setExercise(false)">なし</button>
        </div>
        <p id="ex-selected" style="font-size:12px; color:var(--text-muted); margin:8px 0 0;"></p>
      </div>
      <div class="card">
        <p class="label">サプリメント</p>
        <div style="display:flex; gap:16px; margin-bottom:10px;">
          <div style="flex:1;"><p class="sublabel">日中</p><div id="supp-daytime"></div></div>
          <div style="flex:1; border-left:1px solid var(--border); padding-left:16px;"><p class="sublabel">寝る前</p><div id="supp-night"></div></div>
        </div>
        <button class="btn-block btn-ghost-sm" onclick="openSupplementAdd()">+ サプリを追加</button>
      </div>
    </div>

    <div class="wizard-page" id="phase-4">
      <div class="card">
        <p class="label">コメント</p>
        <textarea id="f-comment" placeholder="気づいたことや改善点など"></textarea>
      </div>
    </div>

    </div>

    <div id="wizard-save-bar" style="position:fixed; bottom:64px; left:0; right:0; display:flex; justify-content:center; padding:10px 16px; background:var(--surface-0); border-top:1px solid var(--border);">
      <div style="max-width:420px; width:100%;">
        <button class="btn-block btn-primary" onclick="saveRecord()">記録する</button>
      </div>
    </div>

  </div>

  <!-- ===== HISTORY ===== -->
  <div class="view" id="view-history">
    <div class="title-row"><button class="btn-ghost-sm" onclick="showView('home')">← 戻る</button><h1>履歴</h1><span style="width:44px;"></span></div>
    <div class="legend">
      <span><span style="display:inline-block;width:16px;height:2px;background:#2a78d6;vertical-align:middle;margin-right:4px;"></span>覚醒度</span>
      <span><span style="display:inline-block;width:16px;height:2px;background:#1baf7a;vertical-align:middle;margin-right:4px;"></span>活動度</span>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#eda100;"></span>飲酒</span>
      <span><span class="dot" style="background:#e34948;"></span>二度寝</span>
      <span><span class="dot" style="background:#4a3aa7;"></span>ストレッチ/リリース</span>
      <span><span class="dot" style="background:#eb6834;"></span>運動</span>
    </div>
    <div id="history-list" style="position:relative;"></div>
  </div>

  <!-- ===== DETAIL ===== -->
  <div class="view" id="view-detail">
    <div class="title-row">
      <button class="btn-ghost-sm" onclick="showView('history')">← 戻る</button>
      <span id="detail-date" style="font-size:15px; font-weight:500;"></span>
      <button class="btn-ghost-sm" onclick="editRecord(currentDetailDate)">編集する</button>
    </div>
    <div id="detail-body"></div>
  </div>

  <div class="view" id="view-settings">
    <div class="title-row"><h1>設定</h1></div>
    <div class="card">
      <p class="label">アプリ</p>
      <button class="btn-block" onclick="location.reload()">ページを更新</button>
    </div>
    <div class="card">
      <p class="label">バックアップ</p>
      <p id="settings-last-backup" style="font-size:13px; color:var(--text-secondary); margin:0 0 14px;"></p>
      <button class="btn-block" style="margin-bottom:10px;" onclick="exportBackup()">バックアップ（ダウンロード）</button>
      <input type="file" id="import-file-input" accept="application/json" style="display:none;" onchange="handleImportFile(this.files[0])">
      <button class="btn-block" onclick="document.getElementById('import-file-input').click()">復元（ファイルを読み込み）</button>
      <p id="settings-import-msg" style="font-size:12px; margin:10px 0 0;"></p>
    </div>
  </div>

  <div id="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="showView('home')"><span class="nav-icon">⌂</span>ホーム</div>
    <div class="nav-item" id="nav-record" onclick="startWizard(draftDate)"><span class="nav-icon">✎</span>詳細</div>
    <div class="nav-item" id="nav-history" onclick="showView('history')"><span class="nav-icon">▤</span>履歴</div>
    <div class="nav-item" id="nav-settings" onclick="showView('settings')"><span class="nav-icon">⚙</span>設定</div>
  </div>

</div>

<div id="modal-root"></div>

<script>
/* ---------- storage ---------- */
const DB_KEY='sleepapp_db_v1';
function loadDB(){
  try{ return JSON.parse(localStorage.getItem(DB_KEY)) || defaultDB(); }
  catch(e){ return defaultDB(); }
}
function defaultDB(){
  return { records:{}, suppMaster:{daytime:['ビタミンB群'], night:['マグネシウム']}, routineMaster:[], presets:[], lastBackupDate:null };
}
let DB = loadDB();
function saveDB(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }catch(e){} }

/* ---------- date helpers ---------- */
function pad(n){ return String(n).padStart(2,'0'); }
function toDateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr(){ return toDateStr(new Date()); }
function addDays(dateStr, n){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return toDateStr(d); }
function fmtShort(dateStr){ const d=new Date(dateStr+'T00:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtWeekday(dateStr){ const w=['日','月','火','水','木','金','土']; return w[new Date(dateStr+'T00:00:00').getDay()]; }

/* ---------- view switching ---------- */
const NAV_MAP={ home:'nav-home', wizard:'nav-record', history:'nav-history', detail:'nav-history', settings:'nav-settings' };
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navId = NAV_MAP[name];
  if(navId) document.getElementById(navId).classList.add('active');
  if(name==='home') renderHome();
  if(name==='history') renderHistory();
  if(name==='settings') renderSettings();
}

/* ---------- draft record ---------- */
let draft = null;
let draftDate = null;

function blankDaytime(){ return {sleepiness:0, activity:2}; }
function newDraft(dateStr){
  const preset = DB.presets.find(p=>p.isDefault);
  const bedtime = preset ? preset.bedtime : '23:30';
  const wake = preset ? preset.wake : '07:00';
  const napPlan = preset ? preset.powerNapPlan : [];
  const routineIds = preset ? preset.routineIds : [];
  const suppDaytime = preset ? preset.suppDaytime : [];
  const suppNight = preset ? preset.suppNight : [];
  return {
    date:dateStr,
    presetId: preset ? preset.id : null,
    sleep:{ plan:{bedtime, wake}, actual:{bedtime, wake} },
    powerNaps:[0,1,2].map(i => napPlan[i] ? {plan:{...napPlan[i]}, actual:{done:false}} : {plan:null, actual:{done:false}}),
    wakingBehavior:{ secondSleep:false, alarmType:'スマホアラーム', alertnessLevel:3,
      routinePlanIds: [...routineIds], routineProgress:{} },
    fallingAsleep:{ fasciaRelease:false, stretch:false, alcohol:{consumed:false, beerCount:0}, carbsG:0 },
    midSleepWake:false,
    daytime:{ morning:blankDaytime(), afternoon:blankDaytime(), evening:blankDaytime() },
    exercise:{ done:false, types:[] },
    supplements:{ daytimeTaken:[...suppDaytime], nightTaken:[...suppNight] },
    comment:''
  };
}

// Loads (or creates) the draft for a given date. Shared by the home screen and
// the wizard so both always edit the exact same in-memory record.
function loadDraft(dateStr){
  draftDate = dateStr;
  draft = DB.records[dateStr] ? JSON.parse(JSON.stringify(DB.records[dateStr])) : newDraft(dateStr);
  // safety for records saved before the routine feature existed
  if(!draft.wakingBehavior.routinePlanIds) draft.wakingBehavior.routinePlanIds=[];
  if(!draft.wakingBehavior.routineProgress) draft.wakingBehavior.routineProgress={};
  if(draft.presetId===undefined) draft.presetId=null;
}
function saveCurrentDraft(){ DB.records[draftDate]=draft; saveDB(); }

function startWizard(dateStr){
  if(draftDate!==dateStr) loadDraft(dateStr);
  showView('wizard');
  renderPhase3(); renderPhase4();
  const scroller=document.getElementById('wizard-scroller');
  scroller.scrollTo({left:0, behavior:'instant'});
  updateWizardStepper(1);
}
function editRecord(dateStr){ startWizard(dateStr); }

const PHASE_LABELS=['生活習慣','まとめ'];
function updateWizardStepper(n){
  document.getElementById('wizard-phase-label').textContent = PHASE_LABELS[n-1];
  document.querySelectorAll('#wizard-dots span').forEach((d,i)=>d.classList.toggle('on', i===n-1));
}
// Detects which page is centered after a swipe settles, refreshes its fields.
let wizardScrollTimer=null;
document.getElementById('wizard-scroller').addEventListener('scroll', function(){
  clearTimeout(wizardScrollTimer);
  wizardScrollTimer=setTimeout(()=>{
    const el=document.getElementById('wizard-scroller');
    const n=Math.max(1, Math.min(2, Math.round(el.scrollLeft/el.clientWidth)+1));
    updateWizardStepper(n);
    if(n===1) renderPhase3();
    if(n===2) renderPhase4();
  }, 120);
});

/* ---- phase 2 ---- */
function toggleBlock(kind){
  draft.fallingAsleep[kind] = !draft.fallingAsleep[kind];
  renderPhase3();
}
function setAlcohol(val){
  draft.fallingAsleep.alcohol.consumed = val;
  renderPhase3();
  if(val) openBeerPicker(()=>{ draft.fallingAsleep.alcohol.consumed=false; renderPhase3(); renderHome(); });
}
function setExercise(val){
  draft.exercise.done = val;
  if(!val) draft.exercise.types=[];
  renderPhase3();
  if(val) openExerciseModal();
}
function renderPhase3(){
  const fa=draft.fallingAsleep;
  document.getElementById('f-fascia').classList.toggle('on', fa.fasciaRelease);
  document.getElementById('f-stretch').classList.toggle('on', fa.stretch);
  document.getElementById('f-alc-yes').classList.toggle('on', fa.alcohol.consumed);
  document.getElementById('f-alc-no').classList.toggle('on', !fa.alcohol.consumed);
  document.getElementById('f-alc-yes').textContent = fa.alcohol.consumed ? ('あり・'+(fa.alcohol.beerCount>=7?'7+':fa.alcohol.beerCount)+'本') : 'あり';
  document.getElementById('f-carbs-btn').textContent = fa.carbsG+' g ・タップで変更';
  document.getElementById('f-ex-yes').classList.toggle('on', draft.exercise.done);

// Shared long-press helper: fires callback if the pointer stays down ~500ms.
function attachLongPress(el, callback){
  el.style.userSelect='none';
  el.style.webkitUserSelect='none';
  el.style.webkitTouchCallout='none';
  let pressTimer=null;
  el.addEventListener('pointerdown', ()=>{
    pressTimer=setTimeout(()=>{
      const sel=window.getSelection(); if(sel) sel.removeAllRanges();
      callback();
    }, 500);
  });
  el.addEventListener('pointerup', ()=>clearTimeout(pressTimer));
  el.addEventListener('pointerleave', ()=>clearTimeout(pressTimer));
}
// Same as attachLongPress, but a short tap (release before 500ms) fires its own callback.
function attachTapAndLongPress(el, shortCallback, longCallback){
  el.style.userSelect='none';
  el.style.webkitUserSelect='none';
  el.style.webkitTouchCallout='none';
  let pressTimer=null, longFired=false;
  el.addEventListener('pointerdown', ()=>{
    longFired=false;
    pressTimer=setTimeout(()=>{
      longFired=true;
      const sel=window.getSelection(); if(sel) sel.removeAllRanges();
      longCallback();
    }, 500);
  });
  el.addEventListener('pointerup', ()=>clearTimeout(pressTimer));
  el.addEventListener('pointerleave', ()=>clearTimeout(pressTimer));
  // Use the browser's native click for the short-tap action — it's far more
  // reliable across browsers than timing pointerdown/pointerup ourselves.
  // Skip it once if a long-press just fired, so it doesn't also trigger.
  el.addEventListener('click', ()=>{
    if(longFired){ longFired=false; return; }
    shortCallback();
  });
}

// Builds a native-scroll picker wheel (like iOS's built-in time picker).
// values: array of display strings/numbers. initialIndex: which one starts centered.
// Returns the wheel's HTML; call attachWheelScroll(id, values.length) after inserting into the DOM.
const WHEEL_ROW_H = 36;
function buildWheel(id, values){
  const items = values.map(v=>'<div class="wheel-item">'+v+'</div>').join('');
  return '<div class="wheel-wrap"><div class="wheel-center"></div>'+
    '<div class="wheel-scroll" id="'+id+'"><div class="wheel-pad"></div>'+items+'<div class="wheel-pad"></div></div></div>';
}
function initWheelScroll(id, initialIndex){
  document.getElementById(id).scrollTop = initialIndex*WHEEL_ROW_H;
}
function readWheelIndex(id, count){
  const idx = Math.round(document.getElementById(id).scrollTop/WHEEL_ROW_H);
  return Math.max(0, Math.min(count-1, idx));
}

function openTimePicker(initial, onConfirm){
  const parts = (initial||'23:30').split(':').map(Number);
  const hourOpts=[...Array(24).keys()].map(pad);
  const minOpts=[0,5,10,15,20,25,30,35,40,45,50,55].map(pad);
  const hourStart = parts[0];
  let minStart = Math.round(parts[1]/5);
  if(minStart>11) minStart=11;
  const root=document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay"><div class="modal">'+
    '<p class="modal-title">時刻を選択</p>'+
    '<div style="display:flex; gap:8px; align-items:center;">'+
    '<div style="flex:1;">'+buildWheel('wheel-hour',hourOpts)+'</div>'+
    '<div style="font-size:16px; color:var(--text-secondary);">:</div>'+
    '<div style="flex:1;">'+buildWheel('wheel-min',minOpts)+'</div>'+
    '</div>'+
    '<div style="display:flex; gap:8px;">'+
    '<button style="flex:1;" onclick="closeModal()">キャンセル</button>'+
    '<button style="flex:1;" class="btn-primary" id="time-ok">確定</button>'+
    '</div></div></div>';
  initWheelScroll('wheel-hour', hourStart);
  initWheelScroll('wheel-min', minStart);
  document.getElementById('time-ok').onclick=()=>{
    const h = readWheelIndex('wheel-hour', hourOpts.length);
    const m = readWheelIndex('wheel-min', minOpts.length);
    closeModal();
    onConfirm(hourOpts[h]+':'+minOpts[m]);
  };
}

// opts: title, min, max, initial, onConfirm(value), format(value), step(optional, default 1)
function openRollPicker(opts){
  const step = opts.step || 1;
  const count = Math.round((opts.max-opts.min)/step) + 1;   // number of options
  const toValue = i => opts.min + i*step;
  const values = [...Array(count).keys()].map(i => opts.format ? opts.format(toValue(i)) : toValue(i));
  let initIdx = Math.round((opts.initial-opts.min)/step);
  initIdx = Math.max(0, Math.min(count-1, initIdx));
  const root=document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay"><div class="modal">'+
    '<p class="modal-title">'+opts.title+'</p>'+
    buildWheel('roll-wheel', values)+
    '<div style="display:flex; gap:8px;">'+
    '<button style="flex:1;" id="picker-cancel">キャンセル</button>'+
    '<button style="flex:1;" class="btn-primary" id="picker-ok">確定</button>'+
    '</div></div></div>';
  initWheelScroll('roll-wheel', initIdx);
  document.getElementById('picker-cancel').onclick=()=>{
    closeModal();
    if(opts.onCancel) opts.onCancel();
  };
  document.getElementById('picker-ok').onclick=()=>{
    const i = readWheelIndex('roll-wheel', count);
    closeModal();
    opts.onConfirm(toValue(i));
  };
}

// Shows the planned routine's own name once one exists, otherwise the generic label.
function homeRoutineLabel(){
  const names = draft.wakingBehavior.routinePlanIds
    .map(id => { const r=DB.routineMaster.find(x=>x.id===id); return r?r.name:null; })
    .filter(Boolean);
  return names.length ? names.join('・') : '起床ルーティン';
}
// True only when every planned routine has all of its steps checked off.
function isRoutineFullyDone(){
  const planIds = draft.wakingBehavior.routinePlanIds;
  if(planIds.length===0) return false;
  return planIds.every(id=>{
    const r = DB.routineMaster.find(x=>x.id===id);
    if(!r) return false;
    const progress = draft.wakingBehavior.routineProgress[id] || 0;
    return progress >= r.steps.length;
  });
}
// Tap target: just today's step checklist for the planned routine(s).
function openRoutineChecklist(){
  const root=document.getElementById('modal-root');
  const planIds = draft.wakingBehavior.routinePlanIds;
  let checklist = '';
  if(planIds.length===0){
    checklist = '<p style="font-size:13px; color:var(--text-muted); margin:0 0 14px;">今日予定されているルーティンはありません</p>';
  } else {
    planIds.forEach(id=>{
      const r = DB.routineMaster.find(x=>x.id===id);
      if(!r) return;
      const progress = draft.wakingBehavior.routineProgress[id] || 0;
      checklist += '<p style="font-size:13px; font-weight:500; margin:12px 0 6px;">'+r.name+'</p>';
      r.steps.forEach((stepText,i)=>{
        const checked = i < progress;
        const enabled = i <= progress;
        checklist += '<label class="checkline" style="opacity:'+(enabled?'1':'0.4')+';">'+
          '<input type="checkbox" '+(checked?'checked':'')+(enabled?'':'disabled')+' onchange="setHomeRoutineStep(\''+id+'\','+i+', this.checked)">'+
          '<span>'+(i+1)+'. '+stepText+'</span></label>';
      });
    });
  }
  root.innerHTML =
    '<div class="modal-overlay"><div class="modal" style="max-height:80vh; overflow-y:auto;">'+
    '<p class="modal-title">起床ルーティン</p>'+
    checklist+
    '<button class="btn-block" style="margin-top:12px;" onclick="closeModal(); renderHome();">閉じる</button>'+
    '</div></div>';
}

// state (if given) lets us resume with in-progress edits after a nested
// picker (time picker) has taken over the modal — see captureState() below.
function openPresetEditor(id, state){
  const existing = id ? DB.presets.find(x=>x.id===id) : null;
  const isNew = !existing;
  const base = existing || {name:'', bedtime:'23:30', wake:'07:00', powerNapPlan:[], routineIds:[], suppDaytime:[], suppNight:[], isDefault:false};
  const s = state || {
    name: base.name, bedtime: base.bedtime, wake: base.wake,
    napPlan: JSON.parse(JSON.stringify(base.powerNapPlan)),
    napShown: Math.max(1, base.powerNapPlan.length),
    routineIds: [...base.routineIds], suppDaytime: [...base.suppDaytime], suppNight: [...base.suppNight],
    isDefault: !!base.isDefault
  };
  const root=document.getElementById('modal-root');
  root.innerHTML =
    '<div class="modal-overlay"><div class="modal" style="max-height:80vh; overflow-y:auto;">'+
    '<p class="modal-title">'+(isNew?'新規プリセット':'プリセット編集')+'</p>'+
    '<label class="sublabel">名前</label><input type="text" id="pe-name" value="'+s.name+'" style="margin-bottom:12px;">'+
    '<div style="display:flex; gap:12px; margin-bottom:14px;">'+
    '<div style="flex:1;"><label class="sublabel">就寝</label><button type="button" class="btn-block" id="pe-bed">'+s.bedtime+'</button></div>'+
    '<div style="flex:1;"><label class="sublabel">起床</label><button type="button" class="btn-block" id="pe-wake">'+s.wake+'</button></div>'+
    '</div>'+
    '<label class="sublabel">パワーナップ</label>'+
    '<div id="pe-naps" style="margin-bottom:8px;"></div>'+
    '<button type="button" class="btn-ghost-sm" id="pe-nap-add" style="margin-bottom:14px;">+ ナップを追加</button>'+
    '<label class="sublabel">ルーティン</label>'+
    (DB.routineMaster.length===0 ? '<p style="font-size:12px; color:var(--text-muted); margin:0 0 10px;">まだルーティンがありません</p>' :
      DB.routineMaster.map(r=>'<label class="checkline"><input type="checkbox" data-r="'+r.id+'" '+(s.routineIds.includes(r.id)?'checked':'')+'><span>'+r.name+'</span></label>').join('')
    )+
    '<label class="sublabel" style="margin-top:10px; display:block;">サプリ・日中</label>'+
    (DB.suppMaster.daytime.map(n=>'<label class="checkline"><input type="checkbox" data-sd="'+n+'" '+(s.suppDaytime.includes(n)?'checked':'')+'><span>'+n+'</span></label>').join('') || '<p style="font-size:12px; color:var(--text-muted); margin:0;">未登録</p>')+
    '<label class="sublabel" style="margin-top:10px; display:block;">サプリ・寝る前</label>'+
    (DB.suppMaster.night.map(n=>'<label class="checkline"><input type="checkbox" data-sn="'+n+'" '+(s.suppNight.includes(n)?'checked':'')+'><span>'+n+'</span></label>').join('') || '<p style="font-size:12px; color:var(--text-muted); margin:0;">未登録</p>')+
    '<button type="button" class="btn-block" id="pe-default" style="margin-top:14px;'+(s.isDefault?' border-color:var(--border-accent); background:var(--bg-accent); color:var(--text-accent);':'')+'">'+(s.isDefault?'✓ デフォルトのプリセット':'デフォルトにする')+'</button>'+
    (isNew?'':'<button type="button" class="btn-block" style="margin-top:8px;" onclick="deletePreset(\''+id+'\')">削除</button>')+
    '<div style="display:flex; gap:8px; margin-top:14px;">'+
    '<button style="flex:1;" onclick="closeModal(); openPresetManager();">戻る</button>'+
    '<button style="flex:1;" class="btn-primary" id="pe-save">保存</button>'+
    '</div></div></div>';

  // Reads everything currently on screen into a plain object, so a nested
  // picker (which takes over the whole modal) can hand it back afterward.
  function captureState(){
    return {
      name: document.getElementById('pe-name').value,
      bedtime: s.bedtime, wake: s.wake, napPlan: s.napPlan, napShown: s.napShown,
      routineIds: [...root.querySelectorAll('[data-r]')].filter(c=>c.checked).map(c=>c.dataset.r),
      suppDaytime: [...root.querySelectorAll('[data-sd]')].filter(c=>c.checked).map(c=>c.dataset.sd),
      suppNight: [...root.querySelectorAll('[data-sn]')].filter(c=>c.checked).map(c=>c.dataset.sn),
      isDefault: s.isDefault
    };
  }
  document.getElementById('pe-bed').onclick=()=>{
    const snap=captureState();
    openTimePicker(s.bedtime, v=>{ snap.bedtime=v; openPresetEditor(id, snap); });
  };
  document.getElementById('pe-wake').onclick=()=>{
    const snap=captureState();
    openTimePicker(s.wake, v=>{ snap.wake=v; openPresetEditor(id, snap); });
  };
  document.getElementById('pe-default').onclick=()=>{
    const snap=captureState();
    snap.isDefault=!snap.isDefault;
    openPresetEditor(id, snap);
  };

  function renderPeNaps(){
    const el=document.getElementById('pe-naps');
    el.innerHTML='';
    for(let i=0;i<s.napShown;i++){
      const t = s.napPlan[i] ? s.napPlan[i].time : '13:00';
      const d = s.napPlan[i] ? s.napPlan[i].durationMin : 20;
      const row=document.createElement('div');
      row.style.cssText='display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;';
      row.innerHTML = (i+1)+'回目 '+
        '<span style="display:flex; gap:8px; align-items:center;">'+
        '<button type="button" class="pe-nap-time" style="width:90px; text-align:left; padding-left:10px;">'+t+'</button>'+
        '<input type="number" class="pe-nap-dur" style="width:56px;" value="'+d+'">分</span>';
      const timeBtn = row.querySelector('.pe-nap-time');
      const durInput = row.querySelector('.pe-nap-dur');
      const idx=i;
      timeBtn.onclick=()=>{
        const snap=captureState();
        const curDur=+durInput.value;
        openTimePicker(t, v=>{ snap.napPlan[idx]={time:v, durationMin:curDur}; openPresetEditor(id, snap); });
      };
      durInput.oninput=e=>{ s.napPlan[idx]={ time:t, durationMin:+e.target.value }; };
      el.appendChild(row);
    }
    document.getElementById('pe-nap-add').style.display = s.napShown>=3 ? 'none' : '';
  }
  document.getElementById('pe-nap-add').onclick=()=>{ if(s.napShown<3){ s.napShown++; renderPeNaps(); } };
  renderPeNaps();

  document.getElementById('pe-save').onclick=()=>{
    const name=document.getElementById('pe-name').value.trim();
    if(!name) return;
    const routineIds=[...root.querySelectorAll('[data-r]')].filter(c=>c.checked).map(c=>c.dataset.r);
    const suppDaytime=[...root.querySelectorAll('[data-sd]')].filter(c=>c.checked).map(c=>c.dataset.sd);
    const suppNight=[...root.querySelectorAll('[data-sn]')].filter(c=>c.checked).map(c=>c.dataset.sn);
    const cleanNapPlan = s.napPlan.slice(0,s.napShown).filter(n=>n);
    const data={ name, bedtime:s.bedtime, wake:s.wake, powerNapPlan:cleanNapPlan, routineIds, suppDaytime, suppNight, isDefault:s.isDefault };
    if(isNew){ data.id='p'+Date.now(); DB.presets.push(data); }
    else { Object.assign(existing, data); }
    if(data.isDefault){ DB.presets.forEach(p=>{ if(p!==existing && p.id!==data.id) p.isDefault=false; }); }
    saveDB();
    closeModal(); openPresetManager();
  };
}

  DB.presets = DB.presets.filter(p=>p.id!==id);

/* ---------- history ---------- */
function timeToPct(t){
  if(!t) return 0;
  const [h,m]=t.split(':').map(Number);
  let mins=h*60+m;
  if(h<12) mins+=1440;
  let pct=(mins-1260)/780*100;
  return Math.max(0,Math.min(100,pct));
}
function avgActivity(rec){
  const d=rec.daytime;
  return (d.morning.activity+d.afternoon.activity+d.evening.activity)/3;
}
function renderHistory(){
  const dates = Object.keys(DB.records).sort().reverse().slice(0,14);
  const list = document.getElementById('history-list');
  if(dates.length===0){ list.innerHTML='<p class="empty">まだ記録がありません</p>'; return; }
  list.innerHTML='';
  const rowH=64;
  const points={alert:[], act:[]};
  dates.forEach((dateStr,i)=>{
    const rec=DB.records[dateStr];
    const leftPct=timeToPct(rec.sleep.actual.bedtime);
    const rightPct=timeToPct(rec.sleep.actual.wake);
    const width=Math.max(4, rightPct-leftPct);
    const flags=[];
    if(rec.fallingAsleep.alcohol.consumed) flags.push('#eda100');
    if(rec.wakingBehavior.secondSleep) flags.push('#e34948');
    if(rec.fallingAsleep.fasciaRelease||rec.fallingAsleep.stretch) flags.push('#4a3aa7');
    if(rec.exercise.done) flags.push('#eb6834');

    const row=document.createElement('div');
    row.className='hist-row';
    row.style.display='flex'; row.style.alignItems='center'; row.style.gap='10px'; row.style.height=rowH+'px';
    row.onclick=()=>{ currentDetailDate=dateStr; renderDetail(dateStr); showView('detail'); };
    row.innerHTML =
      '<div style="width:36px; font-size:12px; color:var(--text-secondary); line-height:1.3;">'+fmtShort(dateStr)+
      '<span style="display:block; font-size:11px; color:var(--text-muted);">'+fmtWeekday(dateStr)+'</span></div>'+
      '<div class="hist-track"><div class="hist-bar" style="left:'+leftPct+'%; width:'+width+'%;"></div></div>'+
      '<div style="display:flex; gap:4px; width:'+(flags.length*11)+'px; justify-content:flex-end;">'+
      flags.map(c=>'<span class="dot" style="background:'+c+';"></span>').join('')+'</div>';
    list.appendChild(row);

    const alertVal = rec.wakingBehavior.alertnessLevel;
    const actVal = avgActivity(rec);
    const trackLeft=46, trackWidth=list.clientWidth?list.clientWidth-46-70:180;
    points.alert.push({x:trackLeft+(alertVal/5)*trackWidth, y:i*rowH+rowH/2});
    points.act.push({x:trackLeft+(actVal/4)*trackWidth, y:i*rowH+rowH/2});
  });

  const svgH = dates.length*rowH;
  const pathFor = pts => pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const dots = pts => pts.map(p=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3"/>').join('');
  const overlay = document.createElement('div');
  overlay.style.cssText='position:absolute; top:0; left:0; width:100%; height:'+svgH+'px; pointer-events:none;';
  overlay.innerHTML =
    '<svg width="100%" height="'+svgH+'" style="position:absolute; top:0; left:0;">'+
    '<path d="'+pathFor(points.alert)+'" fill="none" stroke="#2a78d6" stroke-width="2"/>'+
    '<g fill="#2a78d6">'+dots(points.alert)+'</g>'+
    '<path d="'+pathFor(points.act)+'" fill="none" stroke="#1baf7a" stroke-width="2"/>'+
    '<g fill="#1baf7a">'+dots(points.act)+'</g>'+
    '</svg>';
  list.style.position='relative';
  list.appendChild(overlay);
}

/* ---------- detail ---------- */
let currentDetailDate=null;
function renderDetail(dateStr){
  const rec=DB.records[dateStr];
  document.getElementById('detail-date').textContent = fmtShort(dateStr)+'（'+fmtWeekday(dateStr)+'）';
  if(!rec){ document.getElementById('detail-body').innerHTML='<p class="empty">記録がありません</p>'; return; }
  const napTxt = rec.powerNaps.filter(n=>n.actual.done).map(n=>n.actual.time+'・'+n.actual.durationMin+'分').join('、') || 'なし';
  const routineTxt = (rec.wakingBehavior.routinePlanIds && rec.wakingBehavior.routinePlanIds.length)
    ? rec.wakingBehavior.routinePlanIds.map(id=>{
        const r = DB.routineMaster.find(x=>x.id===id);
        const progress = (rec.wakingBehavior.routineProgress||{})[id] || 0;
        const total = r ? r.steps.length : 0;
        return (r?r.name:'(削除済み)')+' '+progress+'/'+total;
      }).join('、')
    : '予定なし';
  const suppDay = rec.supplements.daytimeTaken.join('、')||'なし';
  const suppNight = rec.supplements.nightTaken.join('、')||'なし';
  document.getElementById('detail-body').innerHTML =
    '<div class="card"><p class="label">睡眠</p><table class="info">'+
    '<tr><td>就寝 → 起床</td><td>'+rec.sleep.actual.bedtime+' → '+rec.sleep.actual.wake+'</td></tr>'+
    '<tr><td>パワーナップ</td><td>'+napTxt+'</td></tr>'+
    '<tr><td>中途覚醒</td><td>'+(rec.midSleepWake?'あり':'なし')+'</td></tr>'+
    '<tr><td>二度寝</td><td>'+(rec.wakingBehavior.secondSleep?'あり':'なし')+'</td></tr>'+
    '<tr><td>アラーム</td><td>'+rec.wakingBehavior.alarmType+'</td></tr>'+
    '<tr><td>寝起きルーティン</td><td>'+routineTxt+'</td></tr>'+
    '</table></div>'+
    '<div class="card"><p class="label">体調</p><table class="info">'+
    '<tr><td>覚醒度</td><td>'+ALERTNESS_LABELS[rec.wakingBehavior.alertnessLevel]+'</td></tr>'+
    '<tr><td>午前</td><td>眠気'+SLEEPINESS_LABELS[rec.daytime.morning.sleepiness]+'・活動'+ACTIVITY_LABELS[rec.daytime.morning.activity]+'</td></tr>'+
    '<tr><td>午後</td><td>眠気'+SLEEPINESS_LABELS[rec.daytime.afternoon.sleepiness]+'・活動'+ACTIVITY_LABELS[rec.daytime.afternoon.activity]+'</td></tr>'+
    '<tr><td>夕方以降</td><td>眠気'+SLEEPINESS_LABELS[rec.daytime.evening.sleepiness]+'・活動'+ACTIVITY_LABELS[rec.daytime.evening.activity]+'</td></tr>'+
    '</table></div>'+
    '<div class="card"><p class="label">生活習慣</p><table class="info">'+
    '<tr><td>筋膜リリース</td><td>'+(rec.fallingAsleep.fasciaRelease?'やった':'やってない')+'</td></tr>'+
    '<tr><td>ストレッチ</td><td>'+(rec.fallingAsleep.stretch?'やった':'やってない')+'</td></tr>'+
    '<tr><td>飲酒</td><td>'+(rec.fallingAsleep.alcohol.consumed?(rec.fallingAsleep.alcohol.beerCount>=7?'7+本':rec.fallingAsleep.alcohol.beerCount+'本'):'なし')+'</td></tr>'+
    '<tr><td>糖質（夜）</td><td>'+rec.fallingAsleep.carbsG+' g</td></tr>'+
    '<tr><td>運動</td><td>'+(rec.exercise.types.join('・')||'なし')+'</td></tr>'+
    '<tr><td>サプリ・日中</td><td>'+suppDay+'</td></tr>'+
    '<tr><td>サプリ・寝る前</td><td>'+suppNight+'</td></tr>'+
    '</table></div>'+
    '<div class="card"><p class="label">まとめ</p>'+
    '<p style="font-size:13px; color:var(--text-secondary); margin:0;">コメント：'+(rec.comment||'特になし')+'</p></div>';
}

/* ---------- settings / backup ---------- */
function daysSince(dateStr){
  const d1 = new Date(dateStr+'T00:00:00');
  const d2 = new Date(todayStr()+'T00:00:00');
  return Math.round((d2-d1)/(1000*60*60*24));
}
function backupStatusText(){
  return DB.lastBackupDate ? ('最終バックアップ：'+daysSince(DB.lastBackupDate)+'日前') : '最終バックアップ：未実施';
}
function exportBackup(){
  const dataStr = JSON.stringify(DB, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'sleepapp_backup_'+todayStr()+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  DB.lastBackupDate = todayStr();
  saveDB();
  renderSettings();
  renderHome();
}
let pendingImportData = null;
function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      pendingImportData = JSON.parse(evt.target.result);
      renderSettings();
    }catch(err){
      pendingImportData = null;
      document.getElementById('settings-import-msg').textContent = '読み込みに失敗しました。ファイル形式を確認してください';
    }
  };
  reader.readAsText(file);
}
function confirmImport(){
  DB = pendingImportData;
  pendingImportData = null;
  saveDB();
  loadDraft(draftDate);
  renderHome();
  renderSettings();
}
function cancelImport(){
  pendingImportData = null;
  document.getElementById('import-file-input').value = '';
  renderSettings();
}
function renderSettings(){
  document.getElementById('settings-last-backup').textContent = backupStatusText();
  const msgEl = document.getElementById('settings-import-msg');
  if(pendingImportData){
    msgEl.innerHTML = '<span style="color:var(--text-warning);">現在のデータを上書きします。よろしいですか？</span><br>'+
      '<button class="btn-ghost-sm" style="margin-top:8px; margin-right:8px;" onclick="confirmImport()">実行する</button>'+
      '<button class="btn-ghost-sm" style="margin-top:8px;" onclick="cancelImport()">キャンセル</button>';
  } else {
    msgEl.textContent='';
  }
}

/* ---------- init ---------- */
loadDraft(todayStr());
renderHome();
attachTapAndLongPress(document.getElementById('home-routine-row'), openRoutineChecklist, openRoutineSelection);
attachTapAndLongPress(document.getElementById('home-preset-area'), openPresetPicker, openPresetManager);
</script>
